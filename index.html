<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan's Arcade Hub</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #fd79a8;
            --tool: #00cec9;
            --casual: #fab1a0;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: white; scroll-behavior: smooth;
        }

        /* 背景微粒效果 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; pointer-events: none; z-index: 0;
        }

        /* 啟動封面 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        #start-btn {
            padding: 18px 50px; font-size: 1.5rem; background: var(--primary);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.5); transition: 0.3s;
        }

        /* 主佈局 */
        .main-content {
            display: none; position: relative; z-index: 1;
            padding: 40px 20px; max-width: 1200px; margin: 0 auto;
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 3rem; text-shadow: 0 5px 15px rgba(0,0,0,0.5); margin: 10px 0; }
        
        /* 簽到面板 */
        .checkin-panel {
            background: var(--glass); color: #333; padding: 15px 30px;
            border-radius: 50px; display: inline-flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 30px;
        }
        #checkin-btn {
            background: var(--accent); color: white; border: none;
            padding: 8px 20px; border-radius: 20px; cursor: pointer;
        }

        /* 分類標籤 */
        .category-header {
            display: flex; align-items: center; margin: 40px 0 20px;
            font-size: 1.5rem; font-weight: bold; color: #a29bfe;
        }
        .category-header::after {
            content: ""; flex: 1; height: 1px; background: rgba(162, 155, 254, 0.3); margin-left: 20px;
        }

        /* 網格系統 */
        .game-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
        }

        .game-card {
            background: var(--glass); border-radius: 15px; padding: 20px;
            text-decoration: none; color: #2d3436; text-align: center;
            transition: 0.3s; border-bottom: 4px solid #dfe6e9;
            position: relative; overflow: hidden;
        }
        .game-card:hover { transform: translateY(-8px); background: #fff; }
        
        /* 不同分類的顏色細節 */
        .cat-action:hover { border-bottom-color: #ff7675; }
        .cat-casual:hover { border-bottom-color: var(--casual); }
        .cat-card:hover { border-bottom-color: var(--primary); }
        .cat-tool:hover { border-bottom-color: var(--tool); }

        .icon { font-size: 3rem; margin-bottom: 10px; }
        .game-title { font-size: 1rem; font-weight: bold; }
        .tag {
            position: absolute; top: 5px; right: -15px; background: #ff7675;
            color: white; font-size: 0.6rem; padding: 2px 15px; transform: rotate(45deg);
        }

        .music-btn {
            position: fixed; bottom: 25px; right: 25px; width: 45px; height: 45px;
            background: rgba(0,0,0,0.5); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="bga1.mp3" type="audio/mpeg"></audio>

    <div id="start-screen">
        <div style="font-size: 4rem;">🎮</div>
        <h1>RYAN ARCADE</h1>
        <button id="start-btn" onclick="initArcade()">ENTER HUB</button>
    </div>

    <div class="music-btn" onclick="toggleMusic()" id="m-icon">🎵</div>

    <div class="main-content" id="main-ui">
        <div class="header-section">
            <h1>Ryan's Game Hub</h1>
            <div class="checkin-panel">
                <span id="checkin-msg">🔥 累計登入：<span id="streak-val">0</span> 天</span>
                <button id="checkin-btn" onclick="doCheckIn()">每日簽到</button>
            </div>
        </div>

        <div class="category-header">⚔️ 動作競技 Action</div>
        <div class="game-grid">
            <a href="https://ryan930105.github.io/KingFighters/" class="game-card cat-action" target="_blank">
                <div class="tag">HOT</div><div class="icon">🥊</div><div class="game-title">拳皇</div>
            </a>
            <a href="https://ryan930105.github.io/CombatShooting-260208/" class="game-card cat-action" target="_blank">
                <div class="icon">💥</div><div class="game-title">對戰射擊</div>
            </a>
            <a href="https://ryan930105.github.io/shooting/" class="game-card cat-action" target="_blank">
                <div class="icon">🎯</div><div class="game-title">槍法練習器</div>
            </a>
            <a href="https://ryan930105.github.io/Towerdefense-260304/" class="game-card cat-action" target="_blank">
                <div class="icon">🏰</div><div class="game-title">戰略塔防</div>
            </a>
        </div>

        <div class="category-header">🧩 益智休閒 Casual</div>
        <div class="game-grid">
            <a href="https://ryan930105.github.io/Pokemongames-260214/" class="game-card cat-casual" target="_blank">
                <div class="icon">🐾</div><div class="game-title">寶可夢培養</div>
            </a>
            <a href="https://ryan930105.github.io/ClawMachine-260222/" class="game-card cat-casual" target="_blank">
                <div class="icon">🧸</div><div class="game-title">夾娃娃機</div>
            </a>
            <a href="https://ryan930105.github.io/aquarium-260217/" class="game-card cat-casual" target="_blank">
                <div class="icon">🐠</div><div class="game-title">虛擬水族箱</div>
            </a>
            <a href="https://ryan930105.github.io/PokeFun-260223/" class="game-card cat-casual" target="_blank">
                <div class="icon">🎁</div><div class="game-title">驚喜戳戳樂</div>
            </a>
            <a href="https://ryan930105.github.io/marbles-260222/" class="game-card cat-casual" target="_blank">
                <div class="icon">🔮</div><div class="game-title">反彈彈珠</div>
            </a>
            <a href="https://ryan930105.github.io/Keyholepin-260223/" class="game-card cat-casual" target="_blank">
                <div class="icon">📍</div><div class="game-title">鍵縫插針</div>
            </a>
            <a href="https://ryan930105.github.io/clicks/" class="game-card cat-casual" target="_blank">
                <div class="icon">🖱️</div><div class="game-title">點擊王</div>
            </a>
        </div>

        <div class="category-header">🃏 博弈牌類 Board & Card</div>
        <div class="game-grid">
            <a href="https://ryan930105.github.io/BigTwo/" class="game-card cat-card" target="_blank">
                <div class="icon">🃏</div><div class="game-title">大老二</div>
            </a>
            <a href="https://ryan930105.github.io/Mahjong/" class="game-card cat-card" target="_blank">
                <div class="icon">🀄</div><div class="game-title">經典麻將</div>
            </a>
            <a href="https://ryan930105.github.io/Slotmachine-260216/" class="game-card cat-card" target="_blank">
                <div class="icon">🎰</div><div class="game-title">豪華拉霸機</div>
            </a>
            <a href="https://ryan930105.github.io/FlipFun-260215/" class="game-card cat-card" target="_blank">
                <div class="icon">🃏</div><div class="game-title">記憶翻翻樂</div>
            </a>
        </div>

        <div class="category-header">⚙️ 系統工具 Tools</div>
        <div class="game-grid">
            <a href="https://ryan930105.github.io/MyRentalSystem/" class="game-card cat-tool" target="_blank">
                <div class="icon">🏠</div><div class="game-title">租賃管理系統</div>
            </a>
        </div>

        <footer style="margin-top: 80px; text-align: center; opacity: 0.5; font-size: 0.8rem; padding-bottom: 40px;">
            &copy; 2026 Ryan Arcade Portal
        </footer>
    </div>

    <script>
        const audio = document.getElementById('bgm');
        function initArcade() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.visibility = 'hidden';
                document.getElementById('main-ui').style.display = 'block';
                audio.play().catch(e => console.log("Audio Playback Blocked"));
            }, 500);
            refreshCheckInUI();
        }
        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById('m-icon').innerText = '🎵'; }
            else { audio.pause(); document.getElementById('m-icon').innerText = '🔇'; }
        }
        function doCheckIn() {
            const today = new Date().toDateString();
            localStorage.setItem('lastDate', today);
            let count = parseInt(localStorage.getItem('streakCount') || '0');
            localStorage.setItem('streakCount', ++count);
            alert("簽到成功！");
            refreshCheckInUI();
        }
        function refreshCheckInUI() {
            const lastDate = localStorage.getItem('lastDate');
            const today = new Date().toDateString();
            const count = localStorage.getItem('streakCount') || '0';
            document.getElementById('streak-val').innerText = count;
            if (lastDate === today) {
                document.getElementById('checkin-btn').disabled = true;
                document.getElementById('checkin-btn').innerText = '今日已簽到';
            }
        }
    </script>
</body>
</html>
