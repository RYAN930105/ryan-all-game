<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan's Game Universe</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            overflow-x: hidden;
        }

        /* --- 啟動封面 (Start Overlay) --- */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }
        #start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.6);
            animation: pulse 2s infinite;
        }

        /* --- 主內容區 --- */
        .main-content {
            display: none; /* 初始隱藏 */
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        /* --- 簽到功能區 --- */
        .checkin-container {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #checkin-btn {
            background: #ff7675;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        #checkin-btn:disabled { background: #b2bec3; cursor: not-allowed; }

        /* --- 遊戲網格 --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .game-card {
            background: var(--glass);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: #2d3436;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .game-card span {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* --- 音樂控制 --- */
        .music-ctrl {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="bga1.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <h1 style="margin-bottom: 40px;">WELCOME TO THE ARCADE</h1>
        <button id="start-btn" onclick="enterSite()">進入遊戲大廳</button>
    </div>

    <div class="music-ctrl" onclick="toggleMusic()" id="music-toggle">🎵</div>

    <div class="main-content" id="main-ui">
        <h1>🎮 我的遊戲收藏庫</h1>
        
        <div class="checkin-container">
            <span id="checkin-status">今天還沒簽到喔！</span>
            <button id="checkin-btn" onclick="checkIn()">每日簽到</button>
            <div style="font-size: 0.8rem; margin-top: 5px;">累計簽到：<span id="streak-count">0</span> 天</div>
        </div>

        <div class="game-grid">
            <a href="https://ryan930105.github.io/CombatShooting-260208/" class="game-card" target="_blank">
                <span>💥</span> 對戰射擊遊戲
            </a>
            <a href="https://ryan930105.github.io/Pokemongames-260214/" class="game-card" target="_blank">
                <span>🐾</span> 寶可夢培養遊戲
            </a>
            <a href="https://ryan930105.github.io/FlipFun-260215/" class="game-card" target="_blank">
                <span>🃏</span> 翻翻樂
            </a>
            <a href="https://ryan930105.github.io/Slotmachine-260216/" class="game-card" target="_blank">
                <span>🎰</span> 拉霸機
            </a>
            <a href="https://ryan930105.github.io/aquarium-260217/" class="game-card" target="_blank">
                <span>🐠</span> 水族箱
            </a>
            <a href="https://ryan930105.github.io/ClawMachine-260222/" class="game-card" target="_blank">
                <span>🧸</span> 夾娃娃遊戲
            </a>
        </div>
    </div>

    <script>
        const bgm = document.getElementById('bgm');
        
        // 進入頁面邏輯
        function enterSite() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                bgm.play(); // 自動播放音樂
            }, 800);
            updateCheckInUI();
        }

        // 音樂開關
        function toggleMusic() {
            if (bgm.paused) {
                bgm.play();
                document.getElementById('music-toggle').innerText = '🎵';
            } else {
                bgm.pause();
                document.getElementById('music-toggle').innerText = '🔇';
            }
        }

        // 簽到功能
        function checkIn() {
            const today = new Date().toLocaleDateString();
            localStorage.setItem('lastCheckIn', today);
            
            let streak = parseInt(localStorage.getItem('streak') || '0');
            streak += 1;
            localStorage.setItem('streak', streak);
            
            alert('簽到成功！祝你今天遊戲愉快！');
            updateCheckInUI();
        }

        function updateCheckInUI() {
            const today = new Date().toLocaleDateString();
            const lastDate = localStorage.getItem('lastCheckIn');
            const streak = localStorage.getItem('streak') || '0';
            
            document.getElementById('streak-count').innerText = streak;

            if (lastDate === today) {
                document.getElementById('checkin-status').innerText = '✅ 今日已完成簽到';
                document.getElementById('checkin-btn').disabled = true;
                document.getElementById('checkin-btn').innerText = '明天再來';
            }
        }
    </script>
</body>
</html>
