<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan's Arcade Hub</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #fd79a8;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #333;
            overflow-x: hidden;
        }

        /* --- 啟動封面 --- */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #start-btn {
            padding: 18px 50px;
            font-size: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.5);
            transition: 0.3s;
        }
        #start-btn:hover { transform: scale(1.1); background: #8275e9; }

        /* --- 主內容區 --- */
        .main-content {
            display: none;
            padding: 40px 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        h1 { color: white; font-size: 2.8rem; margin-bottom: 5px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .subtitle { color: #a29bfe; margin-bottom: 30px; font-weight: 300; }

        /* --- 簽到系統 --- */
        .checkin-panel {
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 40px;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #checkin-btn {
            background: var(--accent);
            color: white; border: none; padding: 10px 25px;
            border-radius: 10px; cursor: pointer; font-size: 1rem;
            transition: 0.2s;
        }
        #checkin-btn:disabled { background: #b2bec3; cursor: not-allowed; }

        /* --- 遊戲網格 --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--glass);
            border-radius: 20px;
            padding: 25px;
            text-decoration: none;
            color: #2d3436;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 5px solid #dfe6e9;
        }

        .game-card:hover {
            transform: translateY(-12px);
            background: #fff;
            border-bottom: 5px solid var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .icon { font-size: 3.5rem; margin-bottom: 15px; }
        .game-title { font-size: 1.25rem; font-weight: bold; }

        /* --- 音樂按鈕 --- */
        .music-btn {
            position: fixed; bottom: 25px; right: 25px;
            width: 50px; height: 50px; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.5rem; color: white; border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="bga1.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <div style="font-size: 4rem; margin-bottom: 20px;">🎮</div>
        <h1 style="letter-spacing: 5px;">RYAN ARCADE</h1>
        <p style="color: #888; margin-bottom: 40px;">Ready to Player One?</p>
        <button id="start-btn" onclick="initArcade()">PRESS START</button>
    </div>

    <div class="music-btn" onclick="toggleMusic()" id="m-icon">🎵</div>

    <div class="main-content" id="main-ui">
        <h1>遊戲大廳</h1>
        <p class="subtitle">精選 HTML5 遊戲收藏</p>
        
        <div class="checkin-panel">
            <div id="checkin-msg" style="margin-bottom: 10px; font-weight: bold;">每日簽到領取好運！</div>
            <button id="checkin-btn" onclick="doCheckIn()">立即簽到</button>
            <div style="margin-top: 10px; font-size: 0.85rem; color: #636e72;">
                🔥 累計登入：<span id="streak-val">0</span> 天
            </div>
        </div>

        <div class="game-grid">
            <a href="https://ryan930105.github.io/CombatShooting-260208/" class="game-card" target="_blank">
                <div class="icon">💥</div>
                <div class="game-title">對戰射擊遊戲</div>
            </a>
            <a href="https://ryan930105.github.io/Pokemongames-260214/" class="game-card" target="_blank">
                <div class="icon">🐾</div>
                <div class="game-title">寶可夢培養</div>
            </a>
            <a href="https://ryan930105.github.io/FlipFun-260215/" class="game-card" target="_blank">
                <div class="icon">🃏</div>
                <div class="game-title">翻翻樂</div>
            </a>
            <a href="https://ryan930105.github.io/Slotmachine-260216/" class="game-card" target="_blank">
                <div class="icon">🎰</div>
                <div class="game-title">拉霸機</div>
            </a>
            <a href="https://ryan930105.github.io/aquarium-260217/" class="game-card" target="_blank">
                <div class="icon">🐠</div>
                <div class="game-title">水族箱</div>
            </a>
            <a href="https://ryan930105.github.io/ClawMachine-260222/" class="game-card" target="_blank">
                <div class="icon">🧸</div>
                <div class="game-title">夾娃娃遊戲</div>
            </a>
            <a href="https://ryan930105.github.io/marbles-260222/" class="game-card" target="_blank">
                <div class="icon">🔮</div>
                <div class="game-title">反彈彈珠</div>
            </a>
            <a href="https://ryan930105.github.io/PokeFun-260223/" class="game-card" target="_blank">
                <div class="icon">🎁</div>
                <div class="game-title">戳戳樂</div>
            </a>
            <a href="https://ryan930105.github.io/Keyholepin-260223/" class="game-card" target="_blank">
                <div class="icon">📍</div>
                <div class="game-title">鍵縫插針</div>
            </a>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgm');

        function initArcade() {
            document.getElementById('start-screen').style.opacity = '0';
            document.getElementById('start-screen').style.visibility = 'hidden';
            document.getElementById('main-ui').style.display = 'block';
            audio.play().catch(e => console.log("Music auto-play blocked"));
            refreshCheckInUI();
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                document.getElementById('m-icon').innerText = '🎵';
            } else {
                audio.pause();
                document.getElementById('m-icon').innerText = '🔇';
            }
        }

        // 簽到邏輯
        function doCheckIn() {
            const today = new Date().toDateString();
            localStorage.setItem('lastDate', today);
            
            let count = parseInt(localStorage.getItem('streakCount') || '0');
            count++;
            localStorage.setItem('streakCount', count);
            
            alert("簽到成功！祝你連勝！");
            refreshCheckInUI();
        }

        function refreshCheckInUI() {
            const lastDate = localStorage.getItem('lastDate');
            const today = new Date().toDateString();
            const count = localStorage.getItem('streakCount') || '0';
            
            document.getElementById('streak-val').innerText = count;
            
            if (lastDate === today) {
                document.getElementById('checkin-btn').disabled = true;
                document.getElementById('checkin-btn').innerText = '今日已領取';
                document.getElementById('checkin-msg').innerText = '✨ 今天的運氣已裝載完成！';
            }
        }
    </script>
</body>
</html>
